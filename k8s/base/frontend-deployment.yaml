apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gke-app
  labels:
    app: frontend
spec:
  replicas: 2
  # Fail the rollout (instead of hanging) if it doesn't make progress in 120s.
  progressDeadlineSeconds: 120
  # Remove an old pod BEFORE creating the new one (no surge). The nodes are tiny
  # and run near full, so there's no spare CPU to surge into. The PDB
  # (minAvailable: 1) still guarantees one pod stays serving throughout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Prefer placing the 2 replicas on different nodes so a single node
      # failure can't take out the whole frontend. "preferred" (soft) so that
      # when the HPA scales beyond the node count, extra pods still schedule.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: frontend:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: gke-app
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
