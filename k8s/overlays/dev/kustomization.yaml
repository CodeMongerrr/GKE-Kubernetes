apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: frontend
    newName: asia-southeast1-docker.pkg.dev/project-aa0faf06-c115-438a-a36/gke-app/frontend
    newTag: dev
  - name: backend
    newName: asia-southeast1-docker.pkg.dev/project-aa0faf06-c115-438a-a36/gke-app/backend
    newTag: dev

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
